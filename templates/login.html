<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Freshmart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0c831f;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .login-card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .brand-icon-box {
      background-color: #0c831f;
      width: 60px;
      height: 60px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: white;
      font-size: 2rem;
      box-shadow: 0 8px 16px rgba(12, 131, 31, 0.2);
    }

    .brand-name {
      color: #0c831f;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .brand-subtitle {
      color: #64748b;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 24px;
    }

    .page-title {
      font-weight: 700;
      color: #1e293b;
      font-size: 1.1rem;
      margin-bottom: 24px;
    }

    .form-label {
      text-align: left;
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: #475569;
      margin-bottom: 8px;
    }

    .form-control {
      border-radius: 12px;
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      background-color: #f8fafc;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .form-control:focus {
      box-shadow: 0 0 0 4px rgba(12, 131, 31, 0.1);
      border-color: #0c831f;
      background-color: white;
    }

    .btn-login {
      background-color: #0c831f;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-top: 10px;
      transition: all 0.3s;
      color: white;
    }

    .btn-login:hover {
      background-color: #0a6b18;
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(12, 131, 31, 0.2);
      color: white;
    }

    .auth-footer {
      margin-top: 24px;
      font-size: 0.9rem;
      color: #64748b;
    }

    .auth-footer a {
      color: #0c831f;
      font-weight: 600;
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Toast Messages */
    #toast-container {
      z-index: 1100;
    }

    .toast-msg {
      background: #ffffff;
      color: #0c831f;
      border-radius: 12px;
      padding: 12px 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.3s ease-out;
      border-left: 4px solid #0c831f;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .toast-msg.danger {
      border-left-color: #dc3545;
      color: #dc3545;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="brand-icon-box">
      <i class="bi bi-shop"></i>
    </div>
    <h1 class="brand-name">Fresh Mart</h1>
    <p class="brand-subtitle">Inventory Management System</p>

    <h2 class="page-title">Welcome Back!</h2>

    <form action="/login" method="POST">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="Enter your email" required />
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required />
      </div>

      <button type="submit" class="btn btn-login w-100 d-flex align-items-center justify-content-center gap-2">
        <i class="bi bi-box-arrow-in-right"></i> LOGIN
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Register here</a>
      </div>
    </form>
  </div>

  <div id="toast-container" class="position-fixed bottom-0 end-0 p-3"></div>

  <script>
    function showToast(message, type = 'success') {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `toast-msg ${type}`;
      let icon = type === 'danger' ? 'bi-exclamation-triangle-fill' : 'bi-check-circle-fill';
      toast.innerHTML = `<i class="bi ${icon}"></i> <span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.transition = "opacity 0.5s ease-out";
        toast.style.opacity = "0";
        setTimeout(() => toast.remove(), 500);
      }, 3000);
    }

    {% with messages = get_flashed_messages(with_categories = true) %}
    {% if messages %}
    {% for category, message in messages %}
    showToast("{{ message }}", "{{ category }}");
    {% endfor %}
    {% endif %}
    {% endwith %}
  </script>
</body>

</html>
